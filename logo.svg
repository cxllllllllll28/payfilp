<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background hexagon -->
  <polygon points="256,30 460,140 460,372 256,482 52,372 52,140" fill="#0D1117" stroke="#667eea33" stroke-width="2"/>
  <polygon points="256,50 440,150 440,362 256,462 72,362 72,150" fill="none" stroke="#667eea11" stroke-width="1"/>

  <!-- AI Brain (neural network nodes) -->
  <g transform="translate(175, 155)" filter="url(#glow)">
    <circle cx="0" cy="0" r="4" fill="url(#brain)"/>
    <circle cx="30" cy="-20" r="3" fill="url(#brain)"/>
    <circle cx="50" cy="10" r="3" fill="url(#brain)"/>
    <circle cx="20" cy="30" r="3" fill="url(#brain)"/>
    <line x1="0" y1="0" x2="30" y2="-20" stroke="url(#brain)" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="50" y2="10" stroke="url(#brain)" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="20" y2="30" stroke="url(#brain)" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Right brain -->
  <g transform="translate(312, 155)" filter="url(#glow)">
    <circle cx="0" cy="0" r="4" fill="url(#brain)"/>
    <circle cx="-30" cy="-20" r="3" fill="url(#brain)"/>
    <circle cx="-50" cy="10" r="3" fill="url(#brain)"/>
    <circle cx="-20" cy="30" r="3" fill="url(#brain)"/>
    <line x1="0" y1="0" x2="-30" y2="-20" stroke="url(#brain)" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-50" y2="10" stroke="url(#brain)" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-20" y2="30" stroke="url(#brain)" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Center coin with $ -->
  <circle cx="256" cy="255" r="65" fill="#1a1f2e" stroke="url(#gold)" stroke-width="3"/>
  <text x="256" y="273" font-family="Arial,Helvetica,sans-serif" font-size="52" font-weight="bold" fill="url(#gold)" text-anchor="middle">$</text>

  <!-- Flip arrows around coin -->
  <g stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M 180 255 Q 165 240 180 225 Q 195 210 210 220"/>
    <polygon points="205,212 212,220 205,228" fill="#f7971e" stroke="none"/>
    <path d="M 332 255 Q 347 270 332 285 Q 317 300 302 290"/>
    <polygon points="307,298 300,290 307,282" fill="#f7971e" stroke="none"/>
  </g>

  <!-- Yield bars (left side) -->
  <g transform="translate(85, 300)">
    <rect x="0" y="0" width="12" height="53" rx="2" fill="url(#brain)" opacity="0.7"/>
    <rect x="16" y="15" width="12" height="38" rx="2" fill="url(#brain)" opacity="0.5"/>
    <rect x="32" y="5" width="12" height="48" rx="2" fill="url(#gold)" opacity="0.6"/>
  </g>

  <!-- Yield bars (right side) -->
  <g transform="translate(387, 300)">
    <rect x="0" y="0" width="12" height="53" rx="2" fill="url(#gold)" opacity="0.6"/>
    <rect x="16" y="10" width="12" height="43" rx="2" fill="url(#brain)" opacity="0.7"/>
    <rect x="32" y="20" width="12" height="33" rx="2" fill="url(#brain)" opacity="0.4"/>
  </g>

  <!-- Project name -->
  <text x="256" y="460" font-family="Arial,Helvetica,sans-serif" font-size="38" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="10" filter="url(#glow)">PayFlip</text>
  <text x="256" y="485" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#667eea88" text-anchor="middle" letter-spacing="4">AI DEFI COPILOT</text>
</svg>